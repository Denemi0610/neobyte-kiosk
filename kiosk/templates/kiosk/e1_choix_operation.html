{% extends 'kiosk/base.html' %}
{% block back_button %}{% endblock %} <!-- Pas de retour sur l'accueil -->
{% block content %}
<div class="text-center max-w-3xl mx-auto">
    <h1 class="text-4xl font-black text-gray-900 mb-12 tracking-tight">Que souhaitez-vous faire ?</h1>
    <form method="POST" class="grid grid-cols-2 gap-6">
        {% csrf_token %}
        <button type="submit" name="operation" value="acheter" class="bg-[#00a896] hover:bg-[#008f80] text-white font-black text-2xl p-10 rounded-2xl shadow-xl transition transform active:scale-95 min-h-[160px]">
            Acheter de la Crypto
        </button>
        <button type="submit" name="operation" value="vendre" class="bg-slate-100 hover:bg-slate-200 text-slate-800 font-black text-2xl p-10 rounded-2xl shadow-md transition transform active:scale-95 min-h-[160px]">
            Vendre de la Crypto
        </button>
    </form>
</div>
{% endblock %}
