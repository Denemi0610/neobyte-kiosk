{% extends 'kiosk/base.html' %}
{% block content %}
<div class="text-center max-w-2xl mx-auto">
    <h1 class="text-4xl font-black text-gray-900 mb-2">Scan du portefeuille</h1>
    <p class="text-gray-400 text-lg mb-8">Présentez le QR code de votre clé publique face au scanner de la borne</p>
    
    <div class="w-48 h-56 bg-[#00a896] mx-auto rounded-2xl relative flex items-center justify-center shadow-lg">
        <div class="w-36 h-24 bg-teal-50 rounded-lg shadow-inner flex flex-col p-3 relative items-center justify-center">
            <div class="absolute w-full h-0.5 bg-red-500 top-1/2 left-0 animate-bounce"></div>
        </div>
    </div>
    <script>
        setTimeout(() => { window.location.href = "{% url 'insertion_especes' %}"; }, 3000);
    </script>
</div>
{% endblock %}
